<!doctype html><html><head><meta charset="utf-8"><title>QENEX · Lower Third</title><style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:#05060F;color:#fff;min-height:100vh;display:grid;place-items:center;padding:40px}
.frame{position:relative}
.cosmos{background:linear-gradient(135deg,#05060F 0%,#1E1B4B 35%,#4C1D95 70%,#7C3AED 100%)}
.mono{font-family:'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;font-size:11px;color:rgba(255,255,255,.6)}

body{background:#0A0E27}
.frame{width:1920px;height:1080px;position:relative;background:linear-gradient(135deg,#0A0E27,#1E1B4B);overflow:hidden}
.lt{position:absolute;left:80px;bottom:120px;display:flex;align-items:center;gap:20px;padding:18px 28px;background:rgba(10,14,39,.7);backdrop-filter:blur(20px);border-left:3px solid #22D3EE;border-radius:6px}
.lt .name{font-size:32px;font-weight:600;color:#fff;letter-spacing:-.01em}
.lt .role{font-size:16px;color:rgba(229,231,245,.7);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.15em;margin-top:4px}
.brand{position:absolute;top:60px;right:80px}
.tag{position:absolute;bottom:60px;right:80px;font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(255,255,255,.5);letter-spacing:.2em;text-transform:uppercase}
</style></head><body>
<div class="frame">
  <div class="brand"><span data-qenex-mark="cosmos" data-size="60"></span></div>
  <div class="lt">
    <div>
      <div class="name">[Speaker Name]</div>
      <div class="role">[Title · Department]</div>
    </div>
  </div>
  <div class="tag">QENEX · qenex.ai</div>
</div>
<script src="../../styles/wordmark.js?v=10"></script>
</body></html>
