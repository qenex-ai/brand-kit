<!doctype html><html><head><meta charset="utf-8"><title>QENEX · Business Card</title><style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:#05060F;color:#fff;min-height:100vh;display:grid;place-items:center;padding:40px}
.frame{position:relative}
.cosmos{background:linear-gradient(135deg,#05060F 0%,#1E1B4B 35%,#4C1D95 70%,#7C3AED 100%)}
.mono{font-family:'JetBrains Mono',monospace;letter-spacing:.12em;text-transform:uppercase;font-size:11px;color:rgba(255,255,255,.6)}

.card{width:1050px;height:600px;border-radius:20px;overflow:hidden;box-shadow:0 60px 120px -40px rgba(0,0,0,.7);position:relative;display:grid;grid-template-columns:1fr 1fr}
.front{padding:64px;display:flex;flex-direction:column;justify-content:space-between}
.front .logo{height:88px}
.front .name{font-size:38px;font-weight:600;letter-spacing:-.01em}
.front .title{font-size:18px;color:rgba(229,231,245,.7);margin-top:6px}
.front .contact{display:grid;gap:10px;font-size:14px;color:rgba(229,231,245,.85);font-family:'JetBrains Mono',monospace}
.back{position:relative;display:grid;place-items:center}
.back svg{position:absolute;inset:0;opacity:.18}
.back .Q{height:240px;filter:drop-shadow(0 30px 60px rgba(124,58,237,.4))}
.tick{position:absolute;bottom:32px;left:64px;width:80px;height:2px;background:#22D3EE}
.regmark{position:absolute;color:rgba(255,255,255,.5);font-size:10px;letter-spacing:.2em;font-family:'JetBrains Mono',monospace}
.tl{top:24px;left:24px}.tr{top:24px;right:24px}.bl{bottom:24px;left:24px}.br{bottom:24px;right:24px}
</style></head><body>
<div class="card cosmos">
  <div class="front">
    <span class="regmark tl">QX·CARD·F</span>
    <div><span data-qenex-mark="cosmos" data-size="64"></span></div>
    <div>
      <div class="name">[Full Name]</div>
      <div class="title">[Title · Department]</div>
    </div>
    <div class="contact">
      <div>name@qenex.ai</div>
      <div>+1 555 000 0000</div>
      <div>qenex.ai</div>
    </div>
    <div class="tick"></div>
  </div>
  <div class="back">
    <span class="regmark tr">QX·CARD·B</span>
    <span class="regmark br">© MMXXVI</span>
    <span data-qenex-mark="knockout" data-size="120" class="Q"></span>
  </div>
</div>
<script src="../../styles/wordmark.js?v=10"></script>
</body></html>
